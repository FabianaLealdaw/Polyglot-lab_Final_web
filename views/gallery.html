<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Polyglot Lab</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="../CSS/style.css">
  </head>
  <body class="bg-light text-dark">
    <header class="site-header fixed-top">
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand" href="../index.html">
            <img
              src="../assets/images/Logo_PL.png"
              alt="Polyglot Lab"
              width="794"
              height="314"
            >
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-controls="mainNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 pt-3 pt-lg-0 gap-lg-3">
              <li class="nav-item">
                <a class="nav-link fw-bold fs-5" href="../index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-bold fs-5 active" aria-current="page" href="./gallery.html">Gallery</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-bold fs-5" href="./contact.html">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <!-- Responsive gallery -->
      <section class="py-5" aria-labelledby="gallery-title">
        <div class="container">
          <h1 id="gallery-title" class="display-3 fw-bold text-center text-dark">Gallery</h1>
          <p class="lead text-center mx-auto mb-5 section-subtitle">A glimpse of our learning spaces and activities.</p>

          <div id="gallery" class="row g-4 gallery-grid">
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase1.jpg" alt="Online language class" width="7276" height="4856">
              </figure>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase2.jpg" alt="Student studying languages" width="7360" height="4912">
              </figure>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase3.jpg" alt="Children reading together" width="6000" height="4000">
              </figure>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase4.jpg" alt="Private remote lesson" width="6655" height="4437">
              </figure>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase5.jpg" alt="Digital language lab" width="6075" height="4050">
              </figure>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase6.jpg" alt="Interactive video class" width="4000" height="2667">
              </figure>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase7.jpg" alt="Teacher leading an online session" width="4000" height="2667">
              </figure>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase8.jpg" alt="Music and language activity" width="7952" height="5304">
              </figure>
            </div>
            <div class="col-12 col-sm-6 col-lg-4">
              <figure class="gallery-item overflow-hidden rounded-4 shadow">
                <img class="w-100" src="../assets/images/gallery/clase9.jpg" alt="Student in a remote language lesson" width="6000" height="4000">
              </figure>
            </div>
          </div>

          <div class="modal fade" id="galleryModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-xl">
              <div class="modal-content bg-transparent border-0">
                <div class="modal-body p-0 text-end">
                  <button
                    type="button"
                    class="btn-close btn-close-white mb-3"
                    data-bs-dismiss="modal"
                    aria-label="Close image preview"
                  ></button>
                  <img
                    id="galleryModalImg"
                    class="img-fluid rounded-4 shadow"
                    src="../assets/images/gallery/clase1.jpg"
                    alt="Enlarged gallery image"
                    width="7276"
                    height="4856"
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer py-5 mt-4">
      <div class="container">
        <div class="row gy-4">
          <div class="col-12 col-lg-4">
            <img
              class="footer-logo mb-4"
              src="../assets/images/Logo_PL.png"
              alt="Polyglot Lab"
              width="794"
              height="314"
            >
            <p>Your language lab for practical, friendly and culture-focused learning.</p>
            <p class="small mb-0">Legal notice: Polyglot Lab, Learning Street 123, 08001 Barcelona.</p>
          </div>
          <div class="col-12 col-sm-6 col-lg-4">
            <h2 class="h5">Menu</h2>
            <nav class="nav flex-column gap-2 footer-nav">
              <a class="link-dark text-decoration-none" href="../index.html">Home</a>
              <a class="link-dark text-decoration-none" href="./gallery.html">Gallery</a>
              <a class="link-dark text-decoration-none" href="./contact.html">Contact</a>
            </nav>
          </div>
          <div class="col-12 col-sm-6 col-lg-4">
            <h2 class="h5">Social media</h2>
            <div class="d-flex gap-4 social-links">
              <a href="https://www.linkedin.com/" aria-label="LinkedIn">
                <span class="social-icon social-icon-linkedin" aria-hidden="true">in</span>
              </a>
              <a href="https://www.instagram.com/" aria-label="Instagram">
                <span class="social-icon social-icon-instagram" aria-hidden="true"></span>
              </a>
            </div>
          </div>
        </div>
        <p class="footer-copy">Copyright 2026</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/gallery.js"></script>
  </body>
</html>
